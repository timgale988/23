kind = "web"
previewPath = "/aperion/"
title = "Aperion — AI-Augmented Fundraising"
version = "1.0.0"
id = "artifacts/aperion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/aperion/" ]
localPort = 21733

[services.development]
run = "pnpm --filter @workspace/aperion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aperion", "run", "build" ]
publicDir = "artifacts/aperion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21733"
BASE_PATH = "/aperion/"
