kind = "web"
previewPath = "/"
title = "Actionable Insight"
version = "1.0.0"
id = "artifacts/actionable-insight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21414

[services.development]
run = "pnpm --filter @workspace/actionable-insight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/actionable-insight", "run", "build" ]
publicDir = "artifacts/actionable-insight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21414"
BASE_PATH = "/"
